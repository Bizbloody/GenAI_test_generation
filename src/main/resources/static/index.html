<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GenAI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <nav class="tabs">
        <button onclick="showPage('test-gen')">Test Generator</button>
        <button onclick="showPage('doc-upload')">Documentation RAG</button>
    </nav>

    <hr>

    <div id="test-gen" class="page">
        <h1>Test Generator</h1>
        <input type="file" id="fileInput" accept=".py, .java">
        <button onclick="uploadFile()">Generate Tests</button>
        <h2>Generated Tests:</h2>
        <pre id="result">Waiting for your code...</pre>
    </div>

    <div id="doc-upload" class="page" style="display:none;">
        <h1>Knowledge Base Upload</h1>
        <p>Upload documentation (.pdf, .txt, .md) to vectorize it into the database. ( function deactivated for general users )</p>
        <input type="file" id="docInput" accept=".pdf,.txt,.md">
        <button class="secondary-btn" onclick="uploadDocumentation()">Vectorize & Store</button>
        <div id="doc-status" class="status-msg"></div>
    </div>

    <div class="footer">
        <a href="https://github.com/Bizbloody/GenAI_test_generation" target="_blank">
            🔗 View project on GitHub
        </a>
    </div>

</div>



<script src="main.js"></script>
</body>
</html>
